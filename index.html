<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezent</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.9">
</head>
<body>
    <div class="container">
        <!-- Kwiatki generowane przez JS -->
    </div>

    <div class="audio-player">
        <div class="player-bg"></div>
        
        <div class="player-content">
            <button id="play-pause-btn" class="play-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            
            <div class="timeline">
                <div class="progress"></div>
            </div>
            
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio" src="assets/audio.mp3"></audio>

    <script src="script.js?v=1.9"></script>
</body>
</html>
